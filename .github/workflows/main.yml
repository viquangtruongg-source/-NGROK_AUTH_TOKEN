name: RemoteDesktop

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Setup Tunnel
      run: |
        # Tải chính xác file zip cài đặt Ngrok chính thức cho Windows 64-bit
        curl -L -o ngrok.zip https://equinox.io
        
        # Giải nén file zip ra thư mục hiện tại để lấy file ngrok.exe
        tar -xf ngrok.zip
        
        # Cấu hình Token xác thực lấy từ GitHub Secrets
        .\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Enable RDP
      run: |
        # Kích hoạt tính năng cho phép kết nối máy tính từ xa
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Start Connection
      run: |
        # Khởi chạy Ngrok kết nối cổng RDP hệ thống (3389)
        Start-Process .\ngrok.exe -ArgumentList "tcp 3389"
        Start-Sleep -Seconds 12
        
        # Lấy chính xác thông tin URL từ API nội bộ của Ngrok
        $api = Invoke-RestMethod -Uri "http://127.0.0"
        $link = $api.tunnels.public_url -replace "tcp://", ""
        
        Write-Output "========================================="
        Write-Output "THONG TIN KET NOI MAY AO RDP:"
        Write-Output "IP COMPUTER: $link"
        Write-Output "USERNAME   : runneradmin"
        Write-Output "PASSWORD   : (De trong hoac nhap mat khau bat ky)"
        Write-Output "========================================="
        
        # Vòng lặp giữ máy chạy an toàn (Keep Alive) trong 6 tiếng
        $time = 0
        while ($time -lt 360) {
            Start-Sleep -Seconds 60
            $time++
            Write-Output "Keep Alive: $time phut."
            [Console]::Out.Flush()
        }
